<svg xmlns='http://www.w3.org/2000/svg' width='900' height='118' viewBox='0 0 900 118' role='img' aria-labelledby='title desc' shape-rendering='crispEdges'>
  <title id='title'>Hi, I'm Chuanrui Wu.</title>
  <desc id='desc'>A compact pixel-terminal animated profile introduction for a light theme.</desc>
  <defs>
    <clipPath id='reveal'><rect class='reveal' x='228' y='15' width='0' height='52'/></clipPath>
  </defs>
  <style>
    .mono{font-family:Consolas,'Lucida Console','Courier New',monospace;letter-spacing:0;text-rendering:optimizeSpeed}
    .pixel-prompt{fill:#087ea4}
    .intro-shadow{fill:#d0d7de;font-size:38px;font-weight:700}
    .intro{fill:#1f2328;font-size:38px;font-weight:700}
    .tagline{fill:#656d76;font-size:14px;font-weight:600;opacity:0;animation:show-tagline 5.4s ease-in-out infinite}
    .tag-mark{fill:#087ea4}
    .reveal{animation:type-intro 5.4s steps(20,end) infinite}
    .cursor-group{animation:move-cursor 5.4s steps(20,end) infinite}
    .cursor{fill:#087ea4;animation:blink .76s step-end infinite}
    @keyframes type-intro{0%,8%{width:0}56%,84%{width:470px}95%,100%{width:0}}
    @keyframes move-cursor{0%,8%{transform:translateX(0)}56%,84%{transform:translateX(470px)}95%,100%{transform:translateX(0)}}
    @keyframes show-tagline{0%,51%{opacity:0;transform:translateY(3px)}60%,84%{opacity:1;transform:translateY(0)}95%,100%{opacity:0}}
    @keyframes blink{0%,48%{opacity:1}49%,100%{opacity:0}}
    @media(prefers-reduced-motion:reduce){
      .reveal{animation:none;width:470px}
      .cursor-group{animation:none;transform:translateX(470px)}
      .tagline{animation:none;opacity:1}
    }
  </style>
  <path class='pixel-prompt' d='M185 23h7v7h7v7h7v7h-7v7h-7v7h-7v-7h7v-7h7v-7h-7v-7h-7z'/>
  <g clip-path='url(#reveal)'>
    <text class='mono intro-shadow' x='232' y='59'>Hi, I'm Chuanrui Wu.</text>
    <text class='mono intro' x='230' y='57'>Hi, I'm Chuanrui Wu.</text>
  </g>
  <g class='cursor-group'><rect class='cursor' x='230' y='25' width='16' height='39'/></g>
  <rect class='tag-mark tagline' x='275' y='86' width='6' height='6'/>
  <text class='mono tagline' x='294' y='94'>I build thoughtful digital experiences.</text>
</svg>
